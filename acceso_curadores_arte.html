<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curador de Arte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:white;border-radius:16px;padding:2rem;max-width:420px;width:100%;box-shadow:0 2px 20px rgba(0,0,0,0.08);text-align:center;}
.museum-icon{font-size:48px;margin-bottom:1rem;}
h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:6px;}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem;line-height:1.5;}
.field{text-align:left;margin-bottom:1rem;}
label{font-size:13px;font-weight:500;color:#333;display:block;margin-bottom:4px;}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;outline:none;transition:border 0.15s;}
input:focus{border-color:#854F0B;}
.btn{width:100%;padding:12px;background:#854F0B;color:white;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:4px;}
.btn:hover{background:#6b3f08;}
.hint{font-size:12px;color:#999;margin-top:1rem;}
</style>
</head>
<body>
<div class="card">
  <div class="museum-icon">🖼️</div>
  <h1>Museo del Arte — Actividad</h1>
  <p class="sub">Ingresa tu nombre para comenzar la actividad como curador/a de arte. Vincent Van Gogh te guiará.</p>
  <div class="field">
    <label for="nombre">Tu nombre</label>
    <input type="text" id="nombre" placeholder="Ej: María García" autocomplete="off"/>
  </div>
  <button class="btn" onclick="entrar()">Entrar al museo →</button>
  <p class="hint">No necesitas crear una cuenta. Solo ingresa tu nombre y comienza.</p>
</div>
<script>
document.getElementById('nombre').addEventListener('keydown', e => { if(e.key==='Enter') entrar(); });
function entrar(){
  const nombre = document.getElementById('nombre').value.trim();
  if(!nombre){ alert('Por favor ingresa tu nombre'); return; }
  sendPrompt('ALUMNO:' + nombre);
}
</script>
</body>
</html>
